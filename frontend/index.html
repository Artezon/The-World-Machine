<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Realtime STT</title>
<style>
  :root {
    --bg: #0d0f12;
    --surface: #15181d;
    --border: #262b33;
    --text: #e8eaed;
    --muted: #8a929e;
    --accent: #4fc3f7;
    --recording: #ef5350;
    --final: #66bb6a;
    --radius: 10px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .app {
    width: 100%;
    max-width: 800px;
    height: 100vh;
    max-height: 900px;
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 20px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--final); box-shadow: 0 0 6px rgba(102,187,106,0.4); }
  .status-dot.recording { background: var(--recording); box-shadow: 0 0 6px rgba(239,83,80,0.4); }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .mic-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .mic-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mic-btn.active {
    background: var(--recording);
    border-color: var(--recording);
    color: #fff;
    box-shadow: 0 0 20px rgba(239,83,80,0.3);
  }
  .mic-btn svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .lang-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    cursor: pointer;
    outline: none;
  }
  .lang-select:focus { border-color: var(--accent); }
  .clear-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    padding: 10px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--accent); }
  .meter { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
  .meter-fill { height: 100%; width: 0%; border-radius: 3px; transition: width 60ms linear; background: var(--final); }
  .transcript-area {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }
  .transcript-area:empty::after {
    content: "Transcript will appear here";
    color: var(--muted);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  .entry {
    padding: 12px 16px;
    border-radius: var(--radius);
    border-left: 3px solid var(--border);
    background: rgba(255,255,255,0.02);
    line-height: 1.5;
    font-size: 16px;
  }
  .entry.realtime { border-left-color: var(--accent); }
  .entry.final { border-left-color: var(--final); }
  .entry .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .entry.realtime .label { color: var(--accent); }
  .entry.final .label { color: var(--final); }
  .entry .text { word-break: break-word; }
  .realtime-text {
    color: var(--accent);
    font-style: italic;
    min-height: 24px;
    padding: 8px 16px;
    border-radius: var(--radius);
    background: rgba(79,195,247,0.06);
    border-left: 3px solid var(--accent);
    font-size: 16px;
    line-height: 1.5;
  }
  .realtime-text:empty { display: none; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Realtime STT</h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <div class="controls">
    <button class="mic-btn" id="micBtn" title="Toggle microphone" disabled>
      <svg viewBox="0 0 24 24">
        <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
      </svg>
    </button>
    <select class="lang-select" id="langSelect">
      <option value="">Auto-detect</option>
      <option value="en">English</option>
      <option value="zh">Chinese</option>
      <option value="de">German</option>
      <option value="es">Spanish</option>
      <option value="ru">Russian</option>
      <option value="ko">Korean</option>
      <option value="fr">French</option>
      <option value="ja">Japanese</option>
      <option value="pt">Portuguese</option>
      <option value="tr">Turkish</option>
      <option value="pl">Polish</option>
      <option value="nl">Dutch</option>
      <option value="ar">Arabic</option>
      <option value="sv">Swedish</option>
      <option value="it">Italian</option>
      <option value="id">Indonesian</option>
      <option value="hi">Hindi</option>
      <option value="fi">Finnish</option>
      <option value="vi">Vietnamese</option>
      <option value="he">Hebrew</option>
      <option value="uk">Ukrainian</option>
      <option value="el">Greek</option>
      <option value="cs">Czech</option>
      <option value="ro">Romanian</option>
      <option value="da">Danish</option>
      <option value="hu">Hungarian</option>
      <option value="th">Thai</option>
      <option value="ur">Urdu</option>
      <option value="hr">Croatian</option>
      <option value="bg">Bulgarian</option>
      <option value="lt">Lithuanian</option>
      <option value="ta">Tamil</option>
      <option value="no">Norwegian</option>
    </select>
    <button class="clear-btn" id="clearBtn">Clear</button>
  </div>

  <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
  <div id="realtimeDisplay" class="realtime-text"></div>

  <div class="transcript-area" id="transcriptArea"></div>
</div>

<script>
const WS_URL = (() => {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  return proto + "//" + location.host + "/ws";
})();

const ui = {
  micBtn: document.getElementById("micBtn"),
  langSelect: document.getElementById("langSelect"),
  clearBtn: document.getElementById("clearBtn"),
  transcriptArea: document.getElementById("transcriptArea"),
  realtimeDisplay: document.getElementById("realtimeDisplay"),
  statusDot: document.getElementById("statusDot"),
  statusText: document.getElementById("statusText"),
  meterFill: document.getElementById("meterFill"),
};

let currentLevel = 0;

let ws = null;
let audioContext = null;
let stream = null;
let processor = null;
let source = null;
let isRecording = false;
let audioQueue = [];
let flushInterval = null;
let manualDisconnect = false;

function setConnected(connected) {
  ui.statusDot.className = "status-dot" + (connected ? " connected" : "");
  ui.statusText.textContent = connected ? "Connected" : "Disconnected";
  ui.micBtn.disabled = !connected;
  if (!connected && isRecording) stopRecording();
}

function setRecording(state) {
  isRecording = state;
  ui.micBtn.classList.toggle("active", state);
  if (state) {
    ui.statusDot.className = "status-dot recording";
    ui.statusText.textContent = "Recording";
  } else {
    ui.statusDot.className = "status-dot connected";
    ui.statusText.textContent = "Connected";
  }
}

function connect() {
  if (ws) {
    try { ws.close(); } catch (_) {}
    ws = null;
  }
  manualDisconnect = false;
  ws = new WebSocket(WS_URL);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    ws.send(JSON.stringify({ language: ui.langSelect.value }));
    ui.statusDot.className = "status-dot";
    ui.statusText.textContent = "Connecting...";
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === "ready") {
        setConnected(true);
      } else if (msg.type === "status") {
        ui.statusText.textContent = msg.text;
      } else if (msg.type === "realtime") {
        ui.realtimeDisplay.textContent = msg.text;
      } else if (msg.type === "final") {
        ui.realtimeDisplay.textContent = "";
        addEntry(msg.text, msg.language);
      }
    } catch (_) {}
  };

  ws.onclose = () => {
    setConnected(false);
    ws = null;
    if (!manualDisconnect) setTimeout(connect, 1000);
  };

  ws.onerror = () => { ws && ws.close(); };
}

const LANG_MAP = {};
ui.langSelect.querySelectorAll("option").forEach(opt => { LANG_MAP[opt.value] = opt.textContent; });

function addEntry(text, language) {
  const div = document.createElement("div");
  div.className = "entry final";
  const label = document.createElement("div");
  label.className = "label";
  label.textContent = LANG_MAP[language] || language || "Auto-detect";
  const content = document.createElement("div");
  content.className = "text";
  content.textContent = text;
  div.append(label, content);
  ui.transcriptArea.append(div);
  ui.transcriptArea.scrollTop = ui.transcriptArea.scrollHeight;
}

function encodePacket(metadata, audioBuf) {
  const metaStr = JSON.stringify(metadata);
  const metaBytes = new TextEncoder().encode(metaStr);
  const packet = new ArrayBuffer(4 + metaBytes.byteLength + audioBuf.byteLength);
  const view = new DataView(packet);
  view.setUint32(0, metaBytes.byteLength, true);
  new Uint8Array(packet, 4, metaBytes.byteLength).set(metaBytes);
  new Uint8Array(packet, 4 + metaBytes.byteLength).set(new Uint8Array(audioBuf));
  return packet;
}

function floatTo16BitPCM(samples) {
  const pcm = new Int16Array(samples.length);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return pcm;
}

function flushAudioQueue() {
  if (!audioQueue.length || !ws || ws.readyState !== WebSocket.OPEN || !isRecording) return;
  const totalLen = audioQueue.reduce((sum, arr) => sum + arr.length, 0);
  const merged = new Float32Array(totalLen);
  let offset = 0;
  for (const arr of audioQueue) { merged.set(arr, offset); offset += arr.length; }
  audioQueue = [];
  const pcm = floatTo16BitPCM(merged);
  const packet = encodePacket({ sampleRate: audioContext ? audioContext.sampleRate : 16000 }, pcm.buffer);
  ws.send(packet);
}

async function startRecording() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1 }
    });
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    source = audioContext.createMediaStreamSource(stream);
    const scriptNode = audioContext.createScriptProcessor(4096, 1, 1);
    scriptNode.onaudioprocess = (e) => {
      if (!isRecording) return;
      const samples = e.inputBuffer.getChannelData(0);
      audioQueue.push(new Float32Array(samples));
      let sum = 0;
      for (let i = 0; i < samples.length; i++) sum += samples[i] * samples[i];
      currentLevel = Math.sqrt(sum / samples.length);
    };
    source.connect(scriptNode);
    scriptNode.connect(audioContext.destination);
    processor = scriptNode;
    setRecording(true);
    flushInterval = setInterval(flushAudioQueue, 100);
  } catch (err) {
    console.error(err);
    setRecording(false);
  }
}

function stopRecording() {
  setRecording(false);
  if (flushInterval) { clearInterval(flushInterval); flushInterval = null; }
  if (processor) { processor.disconnect(); processor = null; }
  if (source) { source.disconnect(); source = null; }
  if (audioContext) { audioContext.close(); audioContext = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  audioQueue = [];
}

function updateMeter() {
  const pct = Math.min(100, currentLevel * 500);
  ui.meterFill.style.width = pct + "%";
  currentLevel *= 0.92;
  requestAnimationFrame(updateMeter);
}
requestAnimationFrame(updateMeter);

ui.micBtn.addEventListener("click", () => {
  if (isRecording) stopRecording();
  else startRecording();
});

ui.clearBtn.addEventListener("click", () => {
  ui.transcriptArea.innerHTML = "";
  ui.realtimeDisplay.textContent = "";
});

ui.langSelect.addEventListener("change", () => {
  if (ws) {
    manualDisconnect = true;
    try { ws.close(); } catch (_) {}
    ws = null;
    setConnected(false);
    connect();
  }
});

connect();
</script>
</body>
</html>
