<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Chat with The World Machine</title>
        <link rel="stylesheet" href="assets/main.css" />
        <link rel="icon" type="image/png" href="/assets/icons/favicon.png" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/assets/icons/apple-touch-icon.png"
        />
        <meta name="apple-mobile-web-app-title" content="World Machine" />
        <link rel="manifest" href="/assets/icons/site.webmanifest" />
        <script src="assets/main.js" defer></script>
    </head>
    <body>
        <div class="app">
            <div class="chat-area">
                <div class="chat-box user-box" id="userBox">
                    <p class="box-text user-text" id="userText"></p>
                </div>
                <div class="chat-box assistant-box" id="assistantBox">
                    <p class="box-text assistant-text" id="assistantText"></p>
                    <img
                        class="face"
                        src="assets/faces/neutral1.png"
                        alt="The World Machine"
                    />
                </div>
            </div>

            <div class="input-area">
                <div class="input-field-wrap">
                    <input
                        type="text"
                        class="text-input"
                        id="textInput"
                        placeholder="Speak to The World Machine..."
                        autofocus
                    />
                </div>
                <button
                    class="action-btn"
                    id="actionBtn"
                    title="Toggle microphone"
                >
                    <div class="mic-fill" id="micFill"></div>
                    <svg class="mic-icon" id="micIcon" viewBox="0 0 24 24">
                        <path
                            d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"
                        />
                        <path d="M19 10v1a7 7 0 0 1-14 0v-1" />
                        <line x1="12" y1="19" x2="12" y2="22" />
                    </svg>
                    <svg
                        class="send-icon"
                        id="sendIcon"
                        viewBox="0 0 24 24"
                        style="display: none"
                    >
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>

            <div class="status-bar">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Disconnected</span>
            </div>
        </div>
    </body>
</html>
