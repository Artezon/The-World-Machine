<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Chat with The World Machine</title>
        <link rel="stylesheet" href="assets/main.css" />
        <script src="assets/main.js" defer></script>
    </head>
    <body>
        <div class="app">
            <div class="machine-container">
                <svg
                    class="machine-svg"
                    viewBox="0 0 500 350"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <defs>
                        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
                            <stop
                                offset="0%"
                                stop-color="#4fc3f7"
                                stop-opacity="0.4"
                            />
                            <stop
                                offset="100%"
                                stop-color="#4fc3f7"
                                stop-opacity="0"
                            />
                        </radialGradient>
                        <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
                            <stop
                                offset="0%"
                                stop-color="#81d4fa"
                                stop-opacity="0.8"
                            />
                            <stop
                                offset="60%"
                                stop-color="#4fc3f7"
                                stop-opacity="0.3"
                            />
                            <stop
                                offset="100%"
                                stop-color="#4fc3f7"
                                stop-opacity="0"
                            />
                        </radialGradient>
                        <linearGradient
                            id="bodyGrad"
                            x1="0"
                            y1="0"
                            x2="0"
                            y2="1"
                        >
                            <stop offset="0%" stop-color="#1a1a2e" />
                            <stop offset="100%" stop-color="#0d0f12" />
                        </linearGradient>
                        <filter id="neonGlow">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feMerge>
                                <feMergeNode in="blur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>

                    <ellipse
                        cx="250"
                        cy="160"
                        rx="180"
                        ry="140"
                        fill="url(#glow)"
                    />

                    <rect
                        x="140"
                        y="270"
                        width="220"
                        height="30"
                        rx="6"
                        fill="#15181d"
                        stroke="#4fc3f7"
                        stroke-width="2"
                        opacity="0.7"
                    />
                    <rect
                        x="160"
                        y="300"
                        width="180"
                        height="40"
                        rx="4"
                        fill="#0d0f12"
                        stroke="#4fc3f7"
                        stroke-width="1"
                        opacity="0.5"
                    />

                    <rect
                        x="40"
                        y="130"
                        width="60"
                        height="16"
                        rx="6"
                        fill="#1a1a2e"
                        stroke="#4fc3f7"

                    />

                        x="30"

                        width="30"
                        height="10"
                        rx="4"
                        fill="#2a2a4e"
                        stroke="#4fc3f7"
                        stroke-width="1"
                    />
                    <circle
                        cx="35"
                        cy="150"
                        r="20"
                        fill="none"
                        stroke="#4fc3f7"
                        stroke-width="1.5"
                        stroke-dasharray="4,4"
                        opacity="0.6"
                    />
                    <circle
                        cx="35"
                        cy="150"
                        r="6"
                        fill="#4fc3f7"
                        opacity="0.4"
                    />

                    <rect
                        x="400"
                        y="130"
                        width="60"
                        height="16"
                        rx="6"
                        fill="#1a1a2e"
                        stroke="#4fc3f7"
                        stroke-width="1.5"
                    />
                    <rect
                        x="440"
                        y="145"
                        width="30"
                        height="10"
                        rx="4"
                        fill="#2a2a4e"
                        stroke="#4fc3f7"
                        stroke-width="1"
                    />
                    <circle
                        cx="465"
                        cy="150"
                        r="20"
                        fill="none"
                        stroke="#4fc3f7"
                        stroke-width="1.5"
                        stroke-dasharray="4,4"
                        opacity="0.6"
                    />

                        cx="465"

                        fill="#4fc3f7"
                        opacity="0.4"
                    />

                    <rect
                        x="150"
                        y="60"
                        width="200"
                        height="210"
                        rx="12"
                        fill="url(#bodyGrad)"
                        stroke="#4fc3f7"
                        stroke-width="2.5"
                    />
                    <rect
                        x="160"
                        y="70"
                        width="180"
                        height="190"
                        rx="8"
                        fill="none"
                        stroke="#4fc3f7"
                        stroke-width="0.5"
                        opacity="0.3"
                    />

                    <rect
                        x="180"
                        y="40"
                        width="140"
                        height="22"
                        rx="5"
                        fill="#15181d"
                        stroke="#4fc3f7"
                        stroke-width="1.5"
                    />

                    <rect

                        rx="2"

                        stroke="#4fc3f7"
                        stroke-width="0.8"
                    />
                    <rect
                        x="135"
                        y="120"
                        width="10"
                        height="60"
                        rx="3"
                        fill="#1a1a2e"
                        stroke="#4fc3f7"
                        stroke-width="0.8"
                    />

                    <rect
                        x="349"
                        y="100"
                        width="6"
                        height="100"
                        rx="2"
                        fill="#2a2a4e"
                        stroke="#4fc3f7"
                        stroke-width="0.8"
                    />
                    <rect
                        x="355"
                        y="120"
                        width="10"
                        height="60"
                        rx="3"
                        fill="#1a1a2e"
                        stroke="#4fc3f7"
                        stroke-width="0.8"
                    />

                    <circle
                        cx="250"
                        cy="165"

                        fill="#0d0f12"
                        stroke="#4fc3f7"
                        stroke-width="2.5"
                    />
                    <circle
                        cx="250"
                        cy="165"
                        r="58"
                        fill="none"
                        stroke="#4fc3f7"
                        stroke-width="0.8"
                        opacity="0.3"
                    />

                    <circle cx="250" cy="165" r="45" fill="url(#eyeGlow)" />

                    <circle
                        cx="250"
                        cy="165"

                        fill="#0d0f12"

                    />

                        cx="250"

                        r="18"
                        fill="#4fc3f7"
                        opacity="0.15"
                    />

                        cx="250"

                        r="8"
                        fill="#4fc3f7"

                    />

                    <line
                        x1="220"
                        y1="165"
                        x2="280"
                        y2="165"
                        stroke="#4fc3f7"
                        stroke-width="0.5"
                        opacity="0.4"
                    />

                        x1="250"
                        y1="135"
                        x2="250"
                        y2="195"
                        stroke="#4fc3f7"
                        stroke-width="0.5"
                        opacity="0.4"
                    />

                    <rect
                        x="170"
                        y="240"
                        width="35"
                        height="15"
                        rx="2"
                        fill="#0a0a1a"
                        stroke="#4fc3f7"
                        stroke-width="0.8"
                    />
                    <rect
                        x="295"
                        y="240"
                        width="35"
                        height="15"
                        rx="2"
                        fill="#0a0a1a"
                        stroke="#4fc3f7"

                    />

                    <rect
                        x="190"

                        width="8"

                    />

                        stroke="#4fc3f7"

                    />

                    <circle
                        cx="160"
                        cy="70"
                        r="3"
                        fill="#4fc3f7"
                        opacity="0.5"
                    />
                    <circle
                        cx="340"
                        cy="70"
                        r="3"
                        fill="#4fc3f7"
                        opacity="0.5"
                    />
                    <circle
                        cx="160"
                        cy="260"
                        r="3"
                        fill="#4fc3f7"
                        opacity="0.5"
                    />
                    <circle
                        cx="340"
                        cy="260"
                        r="3"
                        fill="#4fc3f7"
                        opacity="0.5"
                    />
                </svg>
            </div>

            <div class="chat-area">
                <div class="user-box" id="userBox">
                    <div class="box-label user-label">YOU</div>
                    <div class="box-text user-text" id="userText"></div>
                </div>
                <div class="assistant-box" id="assistantBox">
                    <div class="box-label assistant-label">
                        THE WORLD MACHINE
                    </div>
                    <div
                        class="box-text assistant-text"
                        id="assistantText"
                    ></div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-field-wrap">
                    <input
                        type="text"
                        class="text-input"
                        id="textInput"
                        placeholder="Speak to THE WORLD MACHINE..."
                        autofocus
                    />
                </div>
                <button
                    class="action-btn"
                    id="actionBtn"
                    title="Toggle microphone"
                >
                    <div class="mic-fill" id="micFill"></div>
                    <svg class="mic-icon" id="micIcon" viewBox="0 0 24 24">
                        <path
                            d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"
                        />
                        <path d="M19 10v1a7 7 0 0 1-14 0v-1" />
                        <line x1="12" y1="19" x2="12" y2="22" />
                    </svg>
                    <svg
                        class="send-icon"
                        id="sendIcon"
                        viewBox="0 0 24 24"
                        style="display: none"
                    >
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>

            <div class="status-bar">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Disconnected</span>
            </div>
        </div>
    </body>
</html>
